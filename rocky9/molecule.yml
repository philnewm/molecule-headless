---

dependency:
  name: galaxy
driver:
  name: vagrant
  provider:
    name: virtualbox
lint: |
  set -e
  yamllint
  ansible-lint
platforms:
  - name: rocky9
    box: rockylinux/9
    box_url: "https://dl.rockylinux.org/pub/rocky/9.7/images/x86_64/Rocky-9-Vagrant-Vbox-9.7-20251123.2.x86_64.box"
    memory: 4096
    cpus: 4
    interfaces:
      - auto_config: true
        network_name: private_network
        type: "static"
        ip: "192.168.56.10"
    groups:
      - client
provisioner:
  name: ansible
  env:
    ANSIBLE_DIFF_ALWAYS: false
    ANSIBLE_ROLES_PATH: ~/.cache/molecule/skeleton-ansible-role/${MOLECULE_SCENARIO_NAME}/roles:${MOLECULE_PROJECT_DIRECTORY}/..:~/.ansible/roles:/usr/share/ansible/roles:/etc/ansible/roles
    ROLE_NAME: "{{ lookup('env', 'ROLE_NAME') | default('default_role') }}"
  playbooks:
    create: ../default/create.yml
    prepare: ../default/prepare.yml
    converge: ../default/converge.yml
    side_effect: ../default/side_effect.yml
    verify: ../default/verify.yml
    cleanup: ../default/cleanup.yml
  config_options:
    defaults:
      interpreter_python: /usr/bin/python3
      diff: True
      gathering: smart
      fact_caching_timeout: 3600
      fact_caching: jsonfile
      fact_caching_connection: /tmp/ansible_fact_cache
      stdout_callback: debug
      callbacks_enabled: ansible.posix.profile_tasks
    connection:
      pipelining: true
    env:
      ANSIBLE_FORCE_COLOR: "true"
verifier:
  name: ansible
scenario:
  test_sequence:
      - dependency
      - syntax
      - create
      - prepare
      - converge
      - idempotence
      - side_effect
      - verify
      - cleanup
      - destroy

...
